<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT COLLECTION ₿</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪙</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
        font-family: "Menlo", "Monaco", "Consolas", "Courier New", monospace;
        background-color: #000000;
        text-align: center;
        color: #00ff00;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }
      header, main, footer {
        padding: 1rem;
      }
      header {
        background-color: #0d0d0d;
      }
      main {
        flex: 1;
        overflow-y: auto;
      }
      nav ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      nav li {
        display: inline-block;
      }
      nav li + li::before {
        content: "|";
        margin: 0 0.5em;
      }
      a {
        color: #39ff14; /* Neon Green */
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      nav a {
        font-weight: bold;
      }
      nav {
        font-family: 'Orbitron', sans-serif;
        letter-spacing: 2px;
      }
      img {
        max-width: 50%;
        vertical-align: middle;
        border-radius: 8px;
        margin-top: 1rem;
      }
      footer {
        background-color: #0d0d0d;
        color: white;
        margin-top: 2rem;
        font-size: 10px;
      }
      /* New styles for profile section */
      .profile-container {
        max-width: 800px;
        margin: 0 auto;
        padding: 1rem;
      }
      .professional-card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid #333;
        border-radius: 16px;
        padding: 2rem;
        margin: 2rem 0;
        box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        transition: transform 0.3s ease;
      }
      .professional-card:hover {
        transform: translateY(-5px);
        border-color: #39ff14;
      }
      .cta-button {
        display: inline-block;
        background-color: transparent;
        color: #39ff14;
        border: 2px solid #39ff14;
        padding: 0.8rem 2rem;
        border-radius: 50px;
        font-weight: bold;
        margin-top: 1.5rem;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .cta-button:hover {
        background-color: #39ff14;
        color: #000;
        text-decoration: none;
        box-shadow: 0 0 20px rgba(57, 255, 20, 0.4);
      }
      .nft-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        grid-auto-flow: dense;
        gap: 10px;
        margin-top: 2rem;
      }
      .nft-grid img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 8px;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        max-width: 100%;
        margin-top: 0;
        display: block;
      }
      .nft-grid img:hover {
        transform: scale(1.05);
        box-shadow: 0 0 25px 5px #39ff14;
        z-index: 1;
      }
    </style>
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1259.0.min.js"></script>
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li><a href="/">jeluhu</a></li>
          <li><a href="/emobility.html">e-mobility</a></li>
          <li><a href="/fambam.html">fam-bam</a></li>
          <li><a href="/random.html">random</a></li>
          <li><a href="/portfolio.html">portfolio</a></li>
          <li><a href="/contact.html">contact</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <div class="profile-container">
        <!-- <h2 style="font-size: 2.5rem; margin-bottom: 0.5rem;">NFT Collection</h2> -->
        <h2> NFT COLLECTION 🪙  ️</h2>
        <p style="color: #888; margin-bottom: 2rem;">Digital Assets</p>
        
        <div class="professional-card">
          <!-- <h2 style="color: #fff; margin-bottom: 1rem;">My Gallery</h2> -->
          <p style="max-width: 600px; margin: 0 auto; line-height: 1.6;">
             Explore my NFT Gallery.
          </p>
          <div id="nft-gallery" class="nft-grid">
            <p>Loading NFTs...</p>
          </div>
          <a id="opensea-link" href="#" target="_blank" class="cta-button" onclick="return confirm('🚨 Redirecting to OpenSea. Do you want to proceed? 🚨')">Gallery on OpenSea</a>
        </div>
      </div>
      <script>
        AWS.config.update({
          region: 'us-east-1',
          credentials: new AWS.CognitoIdentityCredentials({
            IdentityPoolId: 'us-east-1:17e37220-fa99-45b9-80b1-4faaf19be9cd'
          })
        });

        // Lightbox state
        let galleryImages = [];
        let currentImageIndex = 0;

        // simple modal/lightbox for mosaic images
        const modal = document.createElement('div');
        modal.style.cssText = `
          display: none;
          position: fixed;
          z-index: 1000;
          left: 0;
          top: 0;
          width: 100%;
          height: 100%;
          background-color: rgba(0, 0, 0, 0.9);
        `;

        const modalImg = document.createElement('img');
        modalImg.style.cssText = `
          margin: auto;
          display: block;
          max-width: 90%;
          max-height: 90%;
          position: absolute;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
        `;

        // Navigation buttons
        const prevBtn = document.createElement('a');
        prevBtn.innerHTML = '&#10094;';
        prevBtn.style.cssText = `
            cursor: pointer;
            position: absolute;
            top: 50%;
            width: auto;
            padding: 16px;
            margin-top: -50px;
            color: white;
            font-weight: bold;
            font-size: 20px;
            transition: 0.6s ease;
            border-radius: 0 3px 3px 0;
            user-select: none;
            -webkit-user-select: none;
            left: 0;
            text-decoration: none;
            background-color: rgba(0,0,0,0.5);
        `;

        const nextBtn = document.createElement('a');
        nextBtn.innerHTML = '&#10095;';
        nextBtn.style.cssText = `
            cursor: pointer;
            position: absolute;
            top: 50%;
            width: auto;
            padding: 16px;
            margin-top: -50px;
            color: white;
            font-weight: bold;
            font-size: 20px;
            transition: 0.6s ease;
            border-radius: 3px 0 0 3px;
            user-select: none;
            -webkit-user-select: none;
            right: 0;
            text-decoration: none;
            background-color: rgba(0,0,0,0.5);
        `;

        modal.appendChild(modalImg);
        modal.appendChild(prevBtn);
        modal.appendChild(nextBtn);
        document.body.appendChild(modal);

        function showImage(index) {
          if (index >= galleryImages.length) index = 0;
          if (index < 0) index = galleryImages.length - 1;
          currentImageIndex = index;
          modalImg.src = galleryImages[index];
        }

        function openLightbox(index) {
          showImage(index);
          modal.style.display = 'block';
        }

        modal.addEventListener('click', (e) => {
          if (e.target === modal || e.target === modalImg) {
            modal.style.display = 'none';
            modalImg.src = '';
          }
        });

        prevBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          showImage(currentImageIndex - 1);
        });

        nextBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          showImage(currentImageIndex + 1);
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
          if (modal.style.display === 'block') {
            if (e.key === 'Escape') {
              modal.style.display = 'none';
              modalImg.src = '';
            } else if (e.key === 'ArrowLeft') {
              showImage(currentImageIndex - 1);
            } else if (e.key === 'ArrowRight') {
              showImage(currentImageIndex + 1);
            }
          }
        });

        async function getOpenSeaApiKey() {
          try {
            const lambda = new AWS.Lambda();
            const data = await lambda.invoke({
              FunctionName: 'retrieveOpenSeaKey', 
            }).promise();
            const payload = JSON.parse(data.Payload);
            return payload.value;
          } catch (err) {
            console.error('Error invoking Lambda:', err);
            return null;
          }
        }

        async function loadNFTs() {
          const gallery = document.getElementById('nft-gallery');
          const apiKey = await getOpenSeaApiKey();
          
          if (!apiKey) {
            gallery.innerHTML = '<p style="color:red;">Could not load API Key. Check console for AWS config errors.</p>';
            return;
          }

          const address = '0x82ab730e819f81b9044dd0f9a6383579fd91b95e';
          document.getElementById('opensea-link').href = `https://opensea.io/${address}`;
          
          gallery.innerHTML = '<p>Loading NFTs...</p>';
          galleryImages = [];
          let isFirstPage = true;
          let nextCursor = '';

          try {
            do {
              const url = `https://api.opensea.io/api/v2/chain/ethereum/account/${address}/nfts?limit=50${nextCursor ? '&next=' + nextCursor : ''}`;
              
              const response = await fetch(url, {
                headers: { 'x-api-key': apiKey }
              });
              const data = await response.json();
              
              if (isFirstPage) {
                gallery.innerHTML = '';
                isFirstPage = false;
              }

              if (data.nfts && data.nfts.length > 0) {
                data.nfts.forEach(nft => {
                  const src = nft.image_url || nft.display_image_url || 'https://via.placeholder.com/250';
                  const img = document.createElement('img');
                  img.alt = nft.name;
                  img.loading = 'lazy';
                  img.decoding = 'async';
                  img.style.cursor = 'pointer';
                  img.onload = () => {
                    const aspect = img.naturalWidth / img.naturalHeight;
                    if (aspect > 1.2) img.style.gridColumn = 'span 2';
                    else if (aspect < 0.8) img.style.gridRow = 'span 2';
                  };
                  img.src = src;

                  const index = galleryImages.length;
                  galleryImages.push(src);
                  img.addEventListener('click', () => openLightbox(index));

                  gallery.appendChild(img);
                });
              }
              
              nextCursor = data.next;

            } while (nextCursor);

            if (isFirstPage) {
              gallery.innerHTML = '<p>No NFTs found.</p>';
            }

          } catch (err) {
            console.error('Error fetching NFTs:', err);
            gallery.innerHTML = '<p style="color:red;">Failed to fetch NFTs.</p>';
          }
        }

        loadNFTs();
      </script>
    </main>
    <footer>
      <tiny>Made in Chicago ❤️</tiny>
    </footer>
  </body>
</html>
