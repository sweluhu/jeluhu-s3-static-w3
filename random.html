<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> RANDOM IMAGE </title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎲</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
        <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
        font-family: "Menlo", "Monaco", "Consolas", "Courier New", monospace;
        background-color: #000000;
        text-align: center;
        color: #00ff00;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }
      header, main, footer {
        padding: 1rem;
      }
      header {
        background-color: #0d0d0d;
      }
      main {
        flex: 1;
        overflow-y: auto;
      }
      nav ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      nav li {
        display: inline-block;
      }
      nav li + li::before {
        content: "|";
        margin: 0 0.5em;
      }
      a {
        color: #39ff14; /* Neon Green */
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      nav a {
        font-weight: bold;
      }
      nav {
        font-family: 'Orbitron', sans-serif;
        letter-spacing: 2px;
      }
      img {
        max-width: 50%;
        vertical-align: middle;
        border-radius: 8px;
        margin-top: 1rem;
      }
      footer {
        background-color: #0d0d0d;
        color: white;
        margin-top: 2rem;
        font-size: 10px;
      }
      .cta-button {
        display: inline-block;
        background-color: transparent;
        color: #39ff14;
        border: 2px solid #39ff14;
        padding: 0.8rem 2rem;
        border-radius: 50px;
        font-weight: bold;
        margin-top: 1.5rem;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        font-size: 1rem;
      }
      .cta-button:hover {
        background-color: #39ff14;
        color: #000;
        text-decoration: none;
        box-shadow: 0 0 20px rgba(57, 255, 20, 0.4);
      }
    </style>
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1259.0.min.js"></script>
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li><a href="/">jeluhu</a></li>
          <li><a href="/emobility.html">e-mobility</a></li>
          <li><a href="/fambam.html">fam-bam</a></li>
          <li><a href="/nft.html">nft</a></li>  
          <li><a href="/portfolio.html">portfolio</a></li>
          <li><a href="/contact.html">contact</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <h2> RANDOM IMAGE </h2>
      <img id="randomImg" alt="picsum" style="max-width:50%;border-radius:8px;margin-top:1rem;min-height:300px;background:#111;">
      <div id="meta" style="margin-top:1rem;color:#9f9"></div>
      <button id="refreshBtn" class="cta-button">🔄 Generate New Image</button>

      <script>
        const img = document.getElementById('randomImg');
        const meta = document.getElementById('meta');
        const refreshBtn = document.getElementById('refreshBtn');

        // AWS Configuration
        AWS.config.update({
          region: 'us-east-1',
          credentials: new AWS.CognitoIdentityCredentials({
            IdentityPoolId: 'us-east-1:17e37220-fa99-45b9-80b1-4faaf19be9cd'
          })
        });

        async function extractImageId(finalUrl, headers) {
          let id = headers.get('picsum-id');
          if (!id) {
            const match = finalUrl.match(/\/id\/(\d+)\//);
            if (match) id = match[1];
          }
          return id;
        }

        async function enrichWithUnsplashMetadata(info) {
          if (!info.url || !info.url.includes('unsplash.com')) return;
          
          try {
            const unsplashId = info.url.split('/').pop();
            const lambda = new AWS.Lambda();
            const params = {
              FunctionName: 'getUnsplashMetadata',
              InvocationType: 'RequestResponse',
              Payload: JSON.stringify({ id: unsplashId })
            };
            const result = await lambda.invoke(params).promise();
            const metadata = JSON.parse(result.Payload);

            if (metadata && !metadata.errorMessage) {
              if (metadata.location) {
                info.location = [metadata.location.city, metadata.location.country].filter(Boolean).join(', ');
              }
              if (metadata.exif) {
                info.camera = [metadata.exif.make, metadata.exif.model].filter(Boolean).join(' ');
              }
            }
          } catch (e) {
            console.warn('Failed to fetch Unsplash metadata', e);
          }
        }

        function renderMetadata(info) {
          meta.innerHTML = `
            <p>✍️ Author: <a href="${info.url}" target="_blank" rel="noopener noreferrer" style="color:#39ff14;">${info.author}</a></p>
            ${info.location ? `<p>📍 Location: ${info.location}</p>` : ''}
            ${info.camera ? `<p>📷 Shot on: ${info.camera}</p>` : ''}
            <p><a href="${info.download_url}" target="_blank" rel="noopener noreferrer" style="color:#39ff14;">Download: ${info.width} × ${info.height}</a></p>
          `;
        }

        async function fetchImageInfo(id) {
          if (!id) {
            meta.textContent = 'Could not determine image ID.';
            return null;
          }

          const infoRes = await fetch(`https://picsum.photos/id/${id}/info`);
          if (!infoRes.ok) {
            meta.textContent = 'Could not fetch info for ID: ' + id;
            return null;
          }

          const info = await infoRes.json();
          await enrichWithUnsplashMetadata(info);
          return info;
        }

        async function loadRandomImage() {
          meta.textContent = 'Loading metadata...';
          img.style.opacity = '0.5';
          
          const targetUrl = 'https://picsum.photos/600?random=' + Date.now();

          try {
            const res = await fetch(targetUrl);
            const finalUrl = res.url;
            
            img.src = finalUrl;
            img.onload = () => img.style.opacity = '1';

            const id = await extractImageId(finalUrl, res.headers);
            const info = await fetchImageInfo(id);
            
            if (info) {
              renderMetadata(info);
            }
          } catch (err) {
            console.error('Metadata fetch failed:', err);
            meta.textContent = 'Metadata unavailable (CORS or network error).';
            img.src = targetUrl;
            img.onload = () => img.style.opacity = '1';
          }
        }

        refreshBtn.addEventListener('click', loadRandomImage);
        
        // Initial load
        loadRandomImage();
      </script>
    </main>
    <footer>
      <tiny>Made in Chicago ❤️</tiny>
    </footer>
  </body>
</html>
